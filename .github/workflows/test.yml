name: Build and Test

on:
  workflow_dispatch:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write
  pull-requests: write
  packages: read
  id-token: write

jobs:
  authorize:
    environment: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository && 'external' || 'internal' }}
    runs-on: ubuntu-latest
    steps:
      - run: true

  build-test:
    needs: authorize
    uses: liquibase/build-logic/.github/workflows/os-extension-test.yml@main
    secrets: inherit

  # TODO: Enable harness tests when the Cassandra extension supports updateSql
  # output capture and the JDBC driver handles errors without corrupting the
  # connection. See: ChangeObjectTests produce empty SQL because the extension
  # uses raw JDBC bypassing LoggingExecutor; ChangeDataTests fail due to int
  # values being quoted as strings (needs InsertGeneratorCassandra).
  #
  # harness-tests:
  #   name: Harness Tests - Cassandra ${{ matrix.cassandra }}
  #   ...

  functional-tests:
    name: Functional Tests
    runs-on: ubuntu-latest
    needs: authorize
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Set up Maven
        uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1 # v5
        with:
          maven-version: "3.9.5"

      - name: Configure Maven settings
        uses: whelk-io/maven-settings-xml-action@9dc09b23833fa9aa7f27b63db287951856f3433d # v22
        with:
          repositories: |
            [
              {
                "id": "liquibase",
                "url": "https://maven.pkg.github.com/liquibase/liquibase",
                "releases": { "enabled": "true" },
                "snapshots": { "enabled": "true", "updatePolicy": "always" }
              },
              {
                "id": "liquibase-pro",
                "url": "https://maven.pkg.github.com/liquibase/liquibase-pro",
                "releases": { "enabled": "true" },
                "snapshots": { "enabled": "true", "updatePolicy": "always" }
              }
            ]
          servers: |
            [
              {
                "id": "liquibase-pro",
                "username": "liquibot",
                "password": "${{ env.LIQUIBOT_PAT_GPM_ACCESS }}"
              },
              {
                "id": "liquibase",
                "username": "liquibot",
                "password": "${{ env.LIQUIBOT_PAT_GPM_ACCESS }}"
              }
            ]

      - name: Start Cassandra 5
        working-directory: src/test/resources/docker
        run: |
          docker compose up -d cassandra-5
          echo "Waiting for Cassandra 5 to be healthy..."
          docker compose up cassandra-init-5
          echo "Cassandra 5 is ready."

      - name: Run Functional Tests
        run: |
          mvn -ntp \
            -Dtest="CassandraFunctionalIT" \
            -DdbUrl="jdbc:cassandra://localhost:9045/betterbotz?compliancemode=Liquibase&localdatacenter=datacenter1" \
            test

      - name: Stop Cassandra
        if: always()
        working-directory: src/test/resources/docker
        run: docker compose down --volumes

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: functional-test-results
          path: |
            target/surefire-reports/
            target/spock-reports/

  dependabot:
    needs: build-test
    uses: liquibase/build-logic/.github/workflows/dependabot-automerge.yml@main
    secrets: inherit
