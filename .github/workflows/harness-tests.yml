name: Harness Tests

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  packages: read
  id-token: write

jobs:
  harness-tests:
    name: Harness Tests - Cassandra 5
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@e6de054238d6b7531b4efff3b6587d9aade6a06c # v6.2.3
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        uses: aws-actions/aws-secretsmanager-get-secrets@2cb1a461cbd4865ac4299648312e4704c646cd53 # v3.0.1
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Set up Maven
        uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1 # v5
        with:
          maven-version: "3.9.5"

      - name: Set up Maven settings.xml
        uses: liquibase/build-logic/.github/actions/setup-maven-settings@216cc985694d009af6bb3d9cdf046a4a21de7335 # main
        with:
          gpm-token: ${{ env.LIQUIBOT_PAT_GPM_ACCESS }}

      - name: Start Cassandra 5
        working-directory: src/test/resources/docker
        run: |
          docker compose up -d cassandra-5
          echo "Waiting for Cassandra 5 to be healthy..."
          docker compose up cassandra-init-5
          echo "Cassandra 5 is ready."

      - name: Run Harness Tests
        run: mvn -ntp -Dtest="LiquibaseHarnessSuiteIT" test

      - name: Stop Cassandra
        if: always()
        working-directory: src/test/resources/docker
        run: docker compose down --volumes

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: harness-test-results
          path: |
            target/surefire-reports/
            target/spock-reports/
